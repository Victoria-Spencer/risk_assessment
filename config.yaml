# config.yaml - 风控模型训练&API共用配置
model:
  model_path: "models/risk_model.pkl"    # 模型保存/加载路径
  scaler_path: "models/risk_scaler.pkl"  # 标准化器保存/加载路径
  feature_cols:                          # 特征列（训练/API必须严格一致）
    - "total_risk_score"
    - "occupation_risk_level"
    - "age"
    - "insure_amount"
    - "has_history_disease"
  random_seed: 42                        # 固定随机种子（训练用）
train:
  n_samples: 10000                       # 模拟训练数据样本量（训练用）
  test_size: 0.2                         # 测试集占比（训练用）
api:
  host: "10.22.209.68"                   # API监听IP
  port: 8000                             # API监听端口